name: Generate Weekly Content

on:
  # Runs every Monday at 6:00 AM UTC
  schedule:
    - cron: '0 6 * * 1'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate weekly content
        id: generate
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate.js

      - name: Send email digest
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: node scripts/email.js

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "Update weekly content for $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push

      - name: Build and deploy to GitHub Pages
        env:
          VITE_BASE: /code-curiosity-clarity/
        run: |
          npm run build
          npx gh-pages -d dist -u "GitHub Actions <actions@github.com>"
